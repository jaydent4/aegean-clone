---
run_config:
  hotel_recommendation_race_services:
  - recommendation_1
  - recommendation_2
  - recommendation_3
services:
  client:
    type: client
    next:
    - node1
    client_workflow: hotel_k6_open_recommendations_client
  frontend:
    type: pbeo_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: hotel_frontend_pbeo
    init_state_workflow: hotel_pbeo_default
  profile:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node2
    - node3
    - node4
    exec_workflow: hotel_profile_pbeo
    init_state_workflow: hotel_pbeo_default
  recommendation_1:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node5
    - node6
    - node7
    exec_workflow: hotel_recommendation_pbeo
    init_state_workflow: hotel_pbeo_default
    run_config:
      hotel_recommendation_pool: pool_1
  recommendation_2:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node8
    - node9
    - node10
    exec_workflow: hotel_recommendation_pbeo
    init_state_workflow: hotel_pbeo_default
    run_config:
      hotel_recommendation_pool: pool_2
  recommendation_3:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node11
    - node12
    - node13
    exec_workflow: hotel_recommendation_pbeo
    init_state_workflow: hotel_pbeo_default
    run_config:
      hotel_recommendation_pool: pool_3
nodes:
  node0:
    service: client
  node1:
    service: frontend
  node2:
    service: profile
  node3:
    service: profile
  node4:
    service: profile
  node5:
    service: recommendation_1
  node6:
    service: recommendation_1
  node7:
    service: recommendation_1
  node8:
    service: recommendation_2
  node9:
    service: recommendation_2
  node10:
    service: recommendation_2
  node11:
    service: recommendation_3
  node12:
    service: recommendation_3
  node13:
    service: recommendation_3
