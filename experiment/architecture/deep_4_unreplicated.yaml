---
services:
  client:
    type: client
    next:
    - node1
    client_workflow: spin_k6_open_client
  deep1:
    type: unreplicated_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: spin_chain
    init_state_workflow: spin_default
    run_config:
      spin_stage: 1
      spin_next_service: deep2
  deep2:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node2
    exec_workflow: spin_chain
    init_state_workflow: spin_default
    run_config:
      spin_stage: 2
      spin_next_service: deep3
  deep3:
    type: unreplicated_server
    clients:
    - node2
    nodes:
    - node3
    exec_workflow: spin_chain
    init_state_workflow: spin_default
    run_config:
      spin_stage: 3
      spin_next_service: deep4
  deep4:
    type: unreplicated_server
    clients:
    - node3
    nodes:
    - node4
    exec_workflow: spin_chain
    init_state_workflow: spin_default
    run_config:
      spin_stage: 4
nodes:
  node0:
    service: client
  node1:
    service: deep1
  node2:
    service: deep2
  node3:
    service: deep3
  node4:
    service: deep4
