---
run_config:
  pbeo_raft_send_batch_size: 256
  eo_raft_send_batch_size: 256
services:
  client:
    type: client
    next:
    - node1
    client_workflow: social_k6_open_client
  compose_post:
    type: pbeo_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: social_compose_post_pbeo
    init_state_workflow: social_pbeo_default
  post_storage:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node2
    - node3
    - node4
    exec_workflow: social_post_storage_pbeo
    init_state_workflow: social_pbeo_default
  user_timeline:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node5
    - node6
    - node7
    exec_workflow: social_user_timeline_pbeo
    init_state_workflow: social_pbeo_default
  home_timeline:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node8
    - node9
    - node10
    exec_workflow: social_home_timeline_pbeo
    init_state_workflow: social_pbeo_default
  social_graph:
    type: pbeo_server
    clients:
    - node8
    - node9
    - node10
    nodes:
    - node11
    - node12
    - node13
    exec_workflow: social_social_graph_pbeo
    init_state_workflow: social_pbeo_default
nodes:
  node0:
    service: client
  node1:
    service: compose_post
  node2:
    service: post_storage
  node3:
    service: post_storage
  node4:
    service: post_storage
  node5:
    service: user_timeline
  node6:
    service: user_timeline
  node7:
    service: user_timeline
  node8:
    service: home_timeline
  node9:
    service: home_timeline
  node10:
    service: home_timeline
  node11:
    service: social_graph
  node12:
    service: social_graph
  node13:
    service: social_graph
