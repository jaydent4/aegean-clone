    is_primary_batcher: true
  node8:
    service: recommendation_1
    is_primary_batcher: false
  node9:
    service: recommendation_1
    is_primary_batcher: false
  node10:
    service: recommendation_2
    is_primary_batcher: true
  node11:
    service: recommendation_2
    is_primary_batcher: false
  node12:
    service: recommendation_2
    is_primary_batcher: false
  node13:
