---
services:
  client:
    type: client
    next:
    - node1
    client_workflow: social_k6_open_client
  compose_post:
    type: unreplicated_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: social_compose_post
    init_state_workflow: social_default
  post_storage:
    type: server
    clients:
    - node1
    nodes:
    - node2
    - node3
    - node4
    exec_workflow: social_post_storage
    init_state_workflow: social_default
    shimQuorumSize: 1
    verifyResponseQuorumSize: 1
    execVerifyQuorumSize: 2
    phaseQuorumSize: 2
    expectedExecVotes: 3
    batcher_config:
      batch_size: 64
      batch_timeout_ms: 1
  user_timeline:
    type: server
    clients:
    - node1
    nodes:
    - node5
    - node6
    - node7
    exec_workflow: social_user_timeline
    init_state_workflow: social_default
    shimQuorumSize: 1
    verifyResponseQuorumSize: 1
    execVerifyQuorumSize: 2
    phaseQuorumSize: 2
    expectedExecVotes: 3
    batcher_config:
      batch_size: 64
      batch_timeout_ms: 1
  home_timeline:
    type: server
    clients:
    - node1
    nodes:
    - node8
    - node9
    - node10
    exec_workflow: social_home_timeline
    init_state_workflow: social_default
    shimQuorumSize: 1
    verifyResponseQuorumSize: 1
    execVerifyQuorumSize: 2
    phaseQuorumSize: 2
    expectedExecVotes: 3
    batcher_config:
      batch_size: 64
      batch_timeout_ms: 5
  social_graph:
    type: unreplicated_server
    clients:
    - node8
    - node9
    - node10
    nodes:
    - node11
    exec_workflow: social_social_graph
    init_state_workflow: social_default
nodes:
  node0:
    service: client
  node1:
    service: compose_post
  node2:
    service: post_storage
    is_primary_batcher: true
  node3:
    service: post_storage
    is_primary_batcher: false
  node4:
    service: post_storage
    is_primary_batcher: false
  node5:
    service: user_timeline
    is_primary_batcher: true
  node6:
    service: user_timeline
    is_primary_batcher: false
  node7:
    service: user_timeline
    is_primary_batcher: false
  node8:
    service: home_timeline
    is_primary_batcher: true
  node9:
    service: home_timeline
    is_primary_batcher: false
  node10:
    service: home_timeline
    is_primary_batcher: false
  node11:
    service: social_graph
    is_primary_batcher: true
