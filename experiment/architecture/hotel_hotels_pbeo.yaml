---
run_config:
  pbeo_raft_send_batch_size: 256
  eo_raft_send_batch_size: 256
services:
  client:
    type: client
    next:
    - node1
    client_workflow: hotel_k6_open_hotels_client
  frontend:
    type: pbeo_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: hotel_frontend_pbeo
    init_state_workflow: hotel_pbeo_default
  search:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node2
    - node3
    - node4
    exec_workflow: hotel_search_pbeo
    init_state_workflow: hotel_pbeo_default
  geo:
    type: pbeo_server
    clients:
    - node2
    - node3
    - node4
    nodes:
    - node5
    - node6
    - node7
    exec_workflow: hotel_geo_pbeo
    init_state_workflow: hotel_pbeo_default
  rate:
    type: pbeo_server
    clients:
    - node2
    - node3
    - node4
    nodes:
    - node8
    - node9
    - node10
    exec_workflow: hotel_rate_pbeo
    init_state_workflow: hotel_pbeo_default
  reservation:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node11
    - node12
    - node13
    exec_workflow: hotel_reservation_pbeo
    init_state_workflow: hotel_pbeo_default
  profile:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node14
    - node15
    - node16
    exec_workflow: hotel_profile_pbeo
    init_state_workflow: hotel_pbeo_default
  recommendation:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node17
    - node18
    - node19
    exec_workflow: hotel_recommendation_pbeo
    init_state_workflow: hotel_pbeo_default
  user:
    type: pbeo_server
    clients:
    - node1
    nodes:
    - node20
    - node21
    - node22
    exec_workflow: hotel_user_pbeo
    init_state_workflow: hotel_pbeo_default
nodes:
  node0:
    service: client
  node1:
    service: frontend
  node2:
    service: search
  node3:
    service: search
  node4:
    service: search
  node5:
    service: geo
  node6:
    service: geo
  node7:
    service: geo
  node8:
    service: rate
  node9:
    service: rate
  node10:
    service: rate
  node11:
    service: reservation
  node12:
    service: reservation
  node13:
    service: reservation
  node14:
    service: profile
  node15:
    service: profile
  node16:
    service: profile
  node17:
    service: recommendation
  node18:
    service: recommendation
  node19:
    service: recommendation
  node20:
    service: user
  node21:
    service: user
  node22:
    service: user
