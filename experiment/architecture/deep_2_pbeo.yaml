---
services:
  client:
    type: client
    next:
    - node1
    - node2
    - node3
    client_workflow: spin_k6_open_client
  deep1:
    type: pbeo_server
    clients:
    - node0
    nodes:
    - node1
    - node2
    - node3
    exec_workflow: spin_chain_pbeo
    init_state_workflow: spin_pbeo_default
    run_config:
      spin_stage: 1
      spin_next_service: deep2
  deep2:
    type: pbeo_server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node4
    - node5
    - node6
    exec_workflow: spin_chain_pbeo
    init_state_workflow: spin_pbeo_default
    run_config:
      spin_stage: 2
nodes:
  node0:
    service: client
  node1:
    service: deep1
  node2:
    service: deep1
  node3:
    service: deep1
  node4:
    service: deep2
  node5:
    service: deep2
  node6:
    service: deep2
