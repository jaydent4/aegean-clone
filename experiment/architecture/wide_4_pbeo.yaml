---
services:
  client:
    type: client
    next:
    - node1
    - node2
    - node3
    client_workflow: spin_k6_open_client
  middle:
    type: pbeo_server
    clients:
    - node0
    nodes:
    - node1
    - node2
    - node3
    exec_workflow: spin_wide_middle_pbeo
    init_state_workflow: spin_pbeo_default
    run_config:
      spin_wide_backend_prefix: backend
  backend1:
    type: pbeo_server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node4
    - node5
    - node6
    exec_workflow: spin_backend_pbeo
    init_state_workflow: spin_pbeo_default
  backend2:
    type: pbeo_server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node7
    - node8
    - node9
    exec_workflow: spin_backend_pbeo
    init_state_workflow: spin_pbeo_default
  backend3:
    type: pbeo_server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node10
    - node11
    - node12
    exec_workflow: spin_backend_pbeo
    init_state_workflow: spin_pbeo_default
  backend4:
    type: pbeo_server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node13
    - node14
    - node15
    exec_workflow: spin_backend_pbeo
    init_state_workflow: spin_pbeo_default
nodes:
  node0:
    service: client
  node1:
    service: middle
  node2:
    service: middle
  node3:
    service: middle
  node4:
    service: backend1
  node5:
    service: backend1
  node6:
    service: backend1
  node7:
    service: backend2
  node8:
    service: backend2
  node9:
    service: backend2
  node10:
    service: backend3
  node11:
    service: backend3
  node12:
    service: backend3
  node13:
    service: backend4
  node14:
    service: backend4
  node15:
    service: backend4
