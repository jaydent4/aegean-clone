---
run_config:
  hotel_recommendation_race_services:
  - recommendation_1
  - recommendation_2
  - recommendation_3
services:
  client:
    type: client
    next:
    - node1
    client_workflow: hotel_k6_open_recommendations_client
  frontend:
    type: unreplicated_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: hotel_frontend
    init_state_workflow: hotel_default
  profile:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node2
    exec_workflow: hotel_profile
    init_state_workflow: hotel_default
  recommendation_1:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node3
    exec_workflow: hotel_recommendation
    init_state_workflow: hotel_default
    run_config:
      hotel_recommendation_pool: pool_1
  recommendation_2:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node4
    exec_workflow: hotel_recommendation
    init_state_workflow: hotel_default
    run_config:
      hotel_recommendation_pool: pool_2
  recommendation_3:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node5
    exec_workflow: hotel_recommendation
    init_state_workflow: hotel_default
    run_config:
      hotel_recommendation_pool: pool_3
nodes:
  node0:
    service: client
  node1:
    service: frontend
  node2:
    service: profile
  node3:
    service: recommendation_1
  node4:
    service: recommendation_2
  node5:
    service: recommendation_3
