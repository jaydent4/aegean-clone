---
architecture: aegean_unreplicated.yaml

# K6 configs
k6_qps: 200
warmup_duration: 10s
duration: 15s
k6_graceful_stop: 0s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Aegean workflow configs
spin_time_seconds: 0.005
write_key_mod: 10
read_key_mod: 10
key_count: 10
value_length: 50000

eo_disable_follower_elections: true

pbeo_disable_follower_elections: true
# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
