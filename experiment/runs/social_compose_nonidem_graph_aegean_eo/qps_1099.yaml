---
architecture: social_compose_nonidem_graph_aegean_eo.yaml

# k6 config
k6_qps: 1099
warmup_duration: 10s
warmup_graceful_stop: 45s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Social workflow config
social_user_count: 32
social_followers_per_user: 3
social_post_text_length: 96
social_nested_send_all_replicas: false
social_mixer_mode: no_home_fanout_key
social_graph_nonidem: true

# Nested exact-once dispatch
eo_raft_send_batch_size: 256
eo_response_batch_size: 64
eo_response_batch_timeout_us: 250
eo_tick_interval_ms: 10
eo_election_tick: 1000
eo_heartbeat_tick: 1
eo_disable_follower_elections: true
nested_use_eo: true
social_nested_use_eo: true
use_eo_after_quorum: true
nested_eo_request_forward_batch_size: 32
nested_eo_request_forward_batch_timeout_us: 500

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 16
gomaxprocs: 32
merkle: treap
