---
architecture: external_srv_open.yaml

# K6 configs
k6_qps: 400
warmup_duration: 10s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# External srv workflow configs
external_service_mode: side_effect

# Nested exact-once dispatch
eo_raft_send_batch_size: 1
eo_tick_interval_ms: 10
eo_election_tick: 10
eo_heartbeat_tick: 1
eo_disable_follower_elections: true
nested_use_eo: true
use_eo_after_quorum: true
nested_eo_request_quorum_timeout_ms: 5000

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
