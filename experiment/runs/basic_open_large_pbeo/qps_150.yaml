---
architecture: basic_open_pbeo.yaml

# K6 configs
k6_qps: 150
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Aegean workflow configs
spin_time_seconds: 0.005
write_key_mod: 1000
read_key_mod: 1000
key_count: 1000
value_length: 100

# PBEO configs
pbeo_tick_interval_ms: 10
pbeo_election_tick: 10
pbeo_heartbeat_tick: 1

# Run & system configs
run_timeout_seconds: 30
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32

