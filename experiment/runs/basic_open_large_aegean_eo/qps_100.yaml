---
architecture: basic_open_eo.yaml
k6_qps: 100
warmup_duration: 10s
warmup_graceful_stop: 45s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000
spin_time_seconds: 0.005
write_key_mod: 10
read_key_mod: 10
key_count: 10
value_length: 50000
nested_use_eo: true
aegean_nested_use_eo: true
use_eo_after_quorum: true
nested_eo_request_quorum_timeout_ms: 5000
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32

# EO configs
eo_raft_send_batch_size: 1
eo_tick_interval_ms: 10
eo_election_tick: 1000
eo_heartbeat_tick: 1
eo_disable_follower_elections: true
