---
architecture: write_pbeo.yaml

# K6 configs
k6_qps: 5
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Write workflow configs
write_value_size_bytes: 10485760

# PBEO configs
pbeo_tick_interval_ms: 10
pbeo_election_tick: 1000
pbeo_heartbeat_tick: 1

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
