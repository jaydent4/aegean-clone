---
architecture: social_read_user_timeline_pbeo.yaml

# k6 config
k6_qps: 100
warmup_duration: 10s
duration: 15s
k6_graceful_stop: 0s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Social workflow config
social_user_count: 32
social_seed_posts_per_user: 10
social_nested_send_all_replicas: false
social_mixer_mode: no_home_fanout_key

# EO configs
eo_raft_send_batch_size: 256
eo_disable_follower_elections: true

# PBEO configs
pbeo_raft_send_batch_size: 256
pbeo_tick_interval_ms: 10
pbeo_election_tick: 1000
pbeo_heartbeat_tick: 1
pbeo_max_executing_requests: 512
pbeo_commit_drain_batch_size: 256
pbeo_disable_follower_elections: true

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
