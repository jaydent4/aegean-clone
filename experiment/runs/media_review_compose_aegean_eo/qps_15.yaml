---
architecture: media_review_compose_aegean_eo.yaml

# k6 config
k6_qps: 15
warmup_duration: 10s
warmup_graceful_stop: 45s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Media review-compose workflow config
media_user_count: 1000
media_movie_count: 1000
media_review_text_length: 256
media_max_reviews_per_index: 100
media_nested_send_all_replicas: true

# Redis durable state config. Redis runs locally inside stateful replica nodes.
media_redis_enable: true
media_redis_addr: 127.0.0.1:6379

# Nested exact-once dispatch
eo_raft_send_batch_size: 1
eo_tick_interval_ms: 10
eo_election_tick: 1000
eo_heartbeat_tick: 1
eo_disable_follower_elections: true
nested_use_eo: true
media_nested_use_eo: true
use_eo_after_quorum: true
nested_eo_request_quorum_timeout_ms: 5000

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
