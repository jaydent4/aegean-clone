---
architecture: req_race_eo_open.yaml

# K6 configs
k6_qps: 400
warmup_duration: 10s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Nested exact-once dispatch
nested_use_eo: true
req_race_nested_use_eo: true
use_eo_after_quorum: true
eo_tick_interval_ms: 10
eo_election_tick: 10
eo_heartbeat_tick: 1
eo_raft_send_batch_size: 1

# Run & system configs
run_timeout_seconds: 20
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
