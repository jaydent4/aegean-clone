---
architecture: response_pbeo.yaml

# K6 configs
k6_qps: 4000
warmup_duration: 10s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 100000

# Response workflow configs
response_size_bytes: 1024

# PBEO configs
pbeo_tick_interval_ms: 10
pbeo_election_tick: 1000
pbeo_heartbeat_tick: 1
pbeo_raft_send_batch_size: 256
eo_raft_send_batch_size: 256

# Run & system configs
run_timeout_seconds: 60
gomaxprocs: 32
