---
architecture: write_aegean_eo.yaml

# K6 configs
k6_qps: 25
warmup_duration: 10s
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Write workflow configs
write_value_size_bytes: 1048576

# Nested exact-once dispatch
eo_raft_send_batch_size: 1
eo_tick_interval_ms: 10
eo_election_tick: 1000
eo_heartbeat_tick: 1
eo_disable_follower_elections: true
nested_use_eo: true
write_nested_use_eo: true
use_eo_after_quorum: true
nested_eo_request_quorum_timeout_ms: 5000

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
