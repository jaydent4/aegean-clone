---
architecture: aegean_eo_opt.yaml

# K6 configs
k6_qps: 200
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Aegean workflow configs
spin_time_seconds: 0.005
write_key_mod: 10
read_key_mod: 10
key_count: 10
value_length: 50000

# Nested exact-once dispatch
nested_use_eo: true
aegean_nested_use_eo: true
eo_tick_interval_ms: 10
eo_election_tick: 1000
eo_heartbeat_tick: 1

# InLog optimized batcher/mixer path
inlog_enabled: true
inlog_tick_interval_ms: 10
inlog_election_tick: 1000
inlog_heartbeat_tick: 1
inlog_campaign_retry_tick: 100

# Run & system configs
run_timeout_seconds: 60
parallel_window_k: 16
worker_count: 8
gomaxprocs: 32
